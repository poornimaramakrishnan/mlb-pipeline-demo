# ============================================================================
# MLB Data Pipeline -- Live Demo (Public)
# ============================================================================
# Click "Run workflow" to generate real MLB data.
# The pipeline runs inside a pre-built Docker container -- no source code here.
# After ~2 minutes, download the output artifacts (CSV + .dat).
#
# Phase 1 modes
# -------------
#   single-date  -> one date          (csv_start_date only)
#   date-range   -> start -> end      (csv_start_date + csv_end_date)
#   season       -> full season       (csv_season)
#   game-ids     -> specific gamePks  (csv_game_ids, space-separated)
# ============================================================================
name: "Run MLB Pipeline Demo"

on:
  workflow_dispatch:
    inputs:
      phase1_mode:
        description: "Phase 1 mode"
        required: true
        default: "date-range"
        type: choice
        options:
          - single-date
          - date-range
          - season
          - game-ids
      csv_season:
        description: "Season year -- used when mode = season"
        required: false
        default: "2025"
        type: string
      csv_start_date:
        description: "Start date (YYYY-MM-DD) -- used for single-date or date-range"
        required: false
        default: "2025-04-01"
        type: string
      csv_end_date:
        description: "End date (YYYY-MM-DD) -- used for date-range (leave blank for single-date)"
        required: false
        default: "2025-04-07"
        type: string
      csv_game_ids:
        description: "Space-separated gamePk values -- used when mode = game-ids"
        required: false
        default: ""
        type: string
      dat_start_date:
        description: "Phase 2 .dat -- start date (YYYY-MM-DD)"
        required: true
        default: "2022-09-01"
        type: string
      dat_end_date:
        description: "Phase 2 .dat -- end date (YYYY-MM-DD, leave blank for single day)"
        required: false
        default: "2022-09-03"
        type: string

jobs:
  demo:
    name: "Generate MLB Pipeline Output"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      packages: read

    env:
      MODE:         ${{ github.event.inputs.phase1_mode }}
      CSV_SEASON:   ${{ github.event.inputs.csv_season }}
      CSV_START:    ${{ github.event.inputs.csv_start_date }}
      CSV_END:      ${{ github.event.inputs.csv_end_date }}
      CSV_GAME_IDS: ${{ github.event.inputs.csv_game_ids }}
      DAT_START:    ${{ github.event.inputs.dat_start_date }}
      DAT_END:      ${{ github.event.inputs.dat_end_date }}

    steps:
      - uses: actions/checkout@v4

      - name: "Prepare output directories"
        run: |
          mkdir -p output/csv output/json output/dat
          chmod 777 output output/csv output/json output/dat

      - name: "Pull MLB Pipeline Docker image"
        run: |
          echo "Pulling pre-built pipeline image from GitHub Container Registry..."
          docker pull ghcr.io/poornimaramakrishnan/mlb-pipeline:latest
          echo "Image pulled successfully"
          docker images ghcr.io/poornimaramakrishnan/mlb-pipeline:latest

      - name: "Phase 1: Generate CSV box scores (mode: ${{ github.event.inputs.phase1_mode }})"
        run: |
          echo "  PHASE 1 -- CSV Box Scores  (Mode: $MODE)"
          case "$MODE" in
            single-date)
              docker run --rm -v "$(pwd)/output:/app/output" \
                ghcr.io/poornimaramakrishnan/mlb-pipeline:latest \
                csv --start-date "$CSV_START"
              ;;
            date-range)
              docker run --rm -v "$(pwd)/output:/app/output" \
                ghcr.io/poornimaramakrishnan/mlb-pipeline:latest \
                csv --start-date "$CSV_START" --end-date "$CSV_END"
              ;;
            season)
              docker run --rm -v "$(pwd)/output:/app/output" \
                ghcr.io/poornimaramakrishnan/mlb-pipeline:latest \
                csv --season "$CSV_SEASON"
              ;;
            game-ids)
              # shellcheck disable=SC2086
              docker run --rm -v "$(pwd)/output:/app/output" \
                ghcr.io/poornimaramakrishnan/mlb-pipeline:latest \
                csv --game-id $CSV_GAME_IDS
              ;;
            *)
              echo "Unknown mode: $MODE"; exit 1 ;;
          esac
          echo ""
          ls -lh output/csv/
          if ls output/csv/*.csv 1>/dev/null 2>&1; then
            echo "Column count : $(head -1 output/csv/*.csv | tr ',' '\n' | wc -l)"
            echo "Game row count: $(tail -n +2 output/csv/*.csv | wc -l)"
          fi

      - name: "Phase 2: Generate .dat structured text (${{ github.event.inputs.dat_start_date }} to ${{ github.event.inputs.dat_end_date || github.event.inputs.dat_start_date }})"
        run: |
          # Resolve end date: default to start date for a single-day run
          DAT_END_RESOLVED="${DAT_END:-$DAT_START}"
          echo "  PHASE 2 -- .dat Structured Text  ($DAT_START -> $DAT_END_RESOLVED)"
          mkdir -p output/dat && chmod 777 output/dat

          CURRENT="$DAT_START"
          while [[ "$CURRENT" <= "$DAT_END_RESOLVED" ]]; do
            echo "--- Generating .dat for $CURRENT ---"
            docker run --rm -v "$(pwd)/output:/app/output" \
              ghcr.io/poornimaramakrishnan/mlb-pipeline:latest \
              dat --date "$CURRENT" || true
            CURRENT=$(date -d "$CURRENT + 1 day" +%Y-%m-%d)
          done

          echo ""
          ls -lh output/dat/
          TOTAL_LINES=0; TOTAL_GAMES=0
          for f in output/dat/*.dat; do
            [ -f "$f" ] || continue
            LINES=$(wc -l < "$f")
            GAMES=$(grep -c '==================' "$f" || true)
            echo "  $f: $LINES lines, $GAMES games"
            TOTAL_LINES=$((TOTAL_LINES + LINES))
            TOTAL_GAMES=$((TOTAL_GAMES + GAMES))
          done
          echo "Total: $TOTAL_LINES lines across $TOTAL_GAMES games"

      - name: "Upload CSV output"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "phase1-csv-${{ github.event.inputs.phase1_mode }}"
          path: output/csv/
          retention-days: 30
          if-no-files-found: warn

      - name: "Upload .dat output"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "phase2-dat-${{ github.event.inputs.dat_start_date }}"
          path: output/dat/
          retention-days: 30
          if-no-files-found: warn

      - name: "Upload raw JSON (audit trail)"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: raw-json-api-responses
          path: output/json/
          retention-days: 30
          if-no-files-found: warn

      - name: "Summary"
        if: always()
        run: |
          CSV_ROWS=0; CSV_COLS=0
          if ls output/csv/*.csv 1>/dev/null 2>&1; then
            CSV_FILE=$(ls output/csv/*.csv | head -1)
            CSV_ROWS=$(tail -n +2 "$CSV_FILE" | wc -l)
            CSV_COLS=$(head -1 "$CSV_FILE" | tr ',' '\n' | wc -l)
            echo "Phase 1 CSV: $CSV_FILE ($CSV_ROWS games, $CSV_COLS columns)"
          fi
          DAT_COUNT=0; DAT_LINES=0
          if ls output/dat/*.dat 1>/dev/null 2>&1; then
            for f in output/dat/*.dat; do
              DAT_COUNT=$((DAT_COUNT + 1))
              DAT_LINES=$((DAT_LINES + $(wc -l < "$f")))
            done
            echo "Phase 2 .dat: $DAT_COUNT file(s), $DAT_LINES total lines"
          fi
          JSON_COUNT=$(ls output/json/*.json 2>/dev/null | wc -l || echo 0)
          echo "Raw JSON: $JSON_COUNT API response file(s)"
          echo "Download the artifacts above to inspect the output."
          {
            echo "## MLB Data Pipeline -- Demo Results"
            echo ""
            echo "| Phase | Output | Details |"
            echo "|-------|--------|---------|"
            echo "| **Phase 1** | CSV box scores (57 columns) | ${CSV_ROWS} games, ${CSV_COLS} columns |"
            echo "| **Phase 2** | .dat structured text | ${DAT_COUNT} file(s), ${DAT_LINES} lines |"
            echo ""
            echo "**Mode:** \`${MODE}\`"
            echo ""
            echo "> Pipeline ran inside a pre-built Docker container."
          } >> "$GITHUB_STEP_SUMMARY"
