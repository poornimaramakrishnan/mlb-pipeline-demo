# =============================================================================
# MLB Data Pipeline -- Live Demo (Public)
# =============================================================================
#
# HOW TO USE
# ----------
# 1. Click "Run workflow" (green button, top-right of the Actions list).
# 2. Fill in the shared date / ID inputs (they apply to ALL selected phases).
# 3. Tick the phases you want to run (Phase 1 CSV and/or Phase 2 .dat).
# 4. Click the green "Run workflow" button.
# 5. Download the artifacts when the run completes (~2 min).
#
# DATA SELECTION MODES (Phase 1 CSV)
# -----------------------------------
#   date-range   Uses start_date -> end_date  (default)
#   single-date  Uses start_date only
#   season       Uses season_year  (all games in the season)
#   game-ids     Uses game_ids     (space-separated gamePk values)
#
# NOTE: Phase 2 .dat always uses start_date -> end_date (or start_date alone).
# =============================================================================
name: "Run MLB Pipeline Demo"

on:
  workflow_dispatch:
    inputs:

      # ── What to run ──────────────────────────────────────────────────────
      run_phase1:
        description: "Phase 1 -- Generate CSV box scores (57 columns)"
        type: boolean
        default: true

      run_phase2:
        description: "Phase 2 -- Generate .dat structured text files"
        type: boolean
        default: true

      # ── Data selection ───────────────────────────────────────────────────
      mode:
        description: "Data selection mode (applies to Phase 1 CSV)"
        required: true
        type: choice
        default: "date-range"
        options:
          - date-range
          - single-date
          - season
          - game-ids

      start_date:
        description: "Start date  YYYY-MM-DD  (date-range / single-date)"
        required: false
        default: "2025-05-13"
        type: string

      end_date:
        description: "End date    YYYY-MM-DD  (date-range; leave blank = same as start)"
        required: false
        default: "2025-05-21"
        type: string

      season_year:
        description: "Season year  (mode = season only, e.g. 2025)"
        required: false
        default: "2025"
        type: string

      game_ids:
        description: "gamePk values  (mode = game-ids; space-separated, e.g. 777944 777940)"
        required: false
        default: ""
        type: string

jobs:
  demo:
    name: "MLB Pipeline"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      packages: read

    env:
      MODE:       ${{ github.event.inputs.mode }}
      START_DATE: ${{ github.event.inputs.start_date }}
      END_DATE:   ${{ github.event.inputs.end_date }}
      SEASON:     ${{ github.event.inputs.season_year }}
      GAME_IDS:   ${{ github.event.inputs.game_ids }}
      RUN_P1:     ${{ github.event.inputs.run_phase1 }}
      RUN_P2:     ${{ github.event.inputs.run_phase2 }}

    steps:
      - uses: actions/checkout@v4

      # ── Docker image ──────────────────────────────────────────────────────
      - name: "Pull MLB Pipeline Docker image"
        run: |
          echo "Pulling image from GitHub Container Registry..."
          docker pull ghcr.io/poornimaramakrishnan/mlb-pipeline:latest
          docker images ghcr.io/poornimaramakrishnan/mlb-pipeline:latest

      # ── Output directories ────────────────────────────────────────────────
      - name: "Prepare output directories"
        run: |
          mkdir -p output/csv output/json output/dat
          chmod 777 output output/csv output/json output/dat

      # ── Phase 1 -- CSV box scores ─────────────────────────────────────────
      - name: "Phase 1: CSV box scores  [mode=${{ github.event.inputs.mode }}]"
        if: ${{ github.event.inputs.run_phase1 == 'true' }}
        run: |
          END_RESOLVED="${END_DATE:-$START_DATE}"
          echo "====================================================="
          echo "  PHASE 1 -- CSV Box Scores"
          echo "  Mode      : $MODE"
          echo "  Start     : $START_DATE"
          echo "  End       : $END_RESOLVED"
          echo "  Season    : $SEASON"
          echo "  Game IDs  : ${GAME_IDS:-(n/a)}"
          echo "====================================================="

          case "$MODE" in
            date-range)
              docker run --rm -v "$(pwd)/output:/app/output" \
                ghcr.io/poornimaramakrishnan/mlb-pipeline:latest \
                csv --start-date "$START_DATE" --end-date "$END_RESOLVED"
              ;;
            single-date)
              docker run --rm -v "$(pwd)/output:/app/output" \
                ghcr.io/poornimaramakrishnan/mlb-pipeline:latest \
                csv --start-date "$START_DATE"
              ;;
            season)
              docker run --rm -v "$(pwd)/output:/app/output" \
                ghcr.io/poornimaramakrishnan/mlb-pipeline:latest \
                csv --season "$SEASON"
              ;;
            game-ids)
              # SC2086: intentional word-splitting on space-separated IDs
              # shellcheck disable=SC2086
              docker run --rm -v "$(pwd)/output:/app/output" \
                ghcr.io/poornimaramakrishnan/mlb-pipeline:latest \
                csv --game-id $GAME_IDS
              ;;
            *)
              echo "Unknown mode: $MODE"; exit 1 ;;
          esac

          echo ""
          if ls output/csv/*.csv 1>/dev/null 2>&1; then
            ls -lh output/csv/
            echo "Columns   : $(head -1 output/csv/*.csv | tr ',' '\n' | wc -l)"
            echo "Game rows : $(tail -n +2 output/csv/*.csv | wc -l)"
          else
            echo "No CSV produced for the selected input."
          fi

      # ── Phase 2 -- .dat structured text ──────────────────────────────────
      - name: "Phase 2: .dat structured text  [${{ github.event.inputs.start_date }} -> ${{ github.event.inputs.end_date || github.event.inputs.start_date }}]"
        if: ${{ github.event.inputs.run_phase2 == 'true' }}
        run: |
          END_RESOLVED="${END_DATE:-$START_DATE}"
          echo "====================================================="
          echo "  PHASE 2 -- .dat Structured Text"
          echo "  Range: $START_DATE -> $END_RESOLVED"
          echo "====================================================="
          mkdir -p output/dat && chmod 777 output/dat

          CURRENT="$START_DATE"
          while [[ "$CURRENT" < "$END_RESOLVED" || "$CURRENT" == "$END_RESOLVED" ]]; do
            echo "--- $CURRENT ---"
            docker run --rm -v "$(pwd)/output:/app/output" \
              ghcr.io/poornimaramakrishnan/mlb-pipeline:latest \
              dat --date "$CURRENT" || true
            CURRENT=$(date -d "$CURRENT + 1 day" +%Y-%m-%d)
          done

          echo ""
          TOTAL_LINES=0; TOTAL_GAMES=0
          for f in output/dat/*.dat; do
            [ -f "$f" ] || continue
            LINES=$(wc -l < "$f")
            GAMES=$(grep -c '==================' "$f" || true)
            echo "  $f : $LINES lines, $GAMES games"
            TOTAL_LINES=$((TOTAL_LINES + LINES))
            TOTAL_GAMES=$((TOTAL_GAMES + GAMES))
          done
          echo "Total: $TOTAL_LINES lines / $TOTAL_GAMES games"

      # ── Artifact label (mode-aware) ───────────────────────────────────────
      - name: "Compute artifact label"
        if: always()
        run: |
          END_RESOLVED="${END_DATE:-$START_DATE}"
          case "$MODE" in
            date-range)
              LABEL="${START_DATE}_to_${END_RESOLVED}" ;;
            single-date)
              LABEL="${START_DATE}" ;;
            season)
              LABEL="season_${SEASON}" ;;
            game-ids)
              LABEL="games_$(echo "$GAME_IDS" | tr ' ' '-')" ;;
            *)
              LABEL="${START_DATE}" ;;
          esac
          echo "ARTIFACT_LABEL=$LABEL" >> "$GITHUB_ENV"
          echo "Artifact label: $LABEL"

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: "Upload Phase 1 CSV"
        uses: actions/upload-artifact@v4
        if: ${{ always() && github.event.inputs.run_phase1 == 'true' }}
        with:
          name: "phase1-csv-${{ github.event.inputs.mode }}-${{ env.ARTIFACT_LABEL }}"
          path: output/csv/
          retention-days: 30
          if-no-files-found: warn

      - name: "Upload Phase 2 .dat"
        uses: actions/upload-artifact@v4
        if: ${{ always() && github.event.inputs.run_phase2 == 'true' }}
        with:
          name: "phase2-dat-${{ env.ARTIFACT_LABEL }}"
          path: output/dat/
          retention-days: 30
          if-no-files-found: warn

      - name: "Upload raw JSON (audit trail)"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "raw-json-${{ env.ARTIFACT_LABEL }}"
          path: output/json/
          retention-days: 30
          if-no-files-found: warn

      # ── Summary ───────────────────────────────────────────────────────────
      - name: "Summary"
        if: always()
        run: |
          CSV_ROWS=0; CSV_COLS=0
          if ls output/csv/*.csv 1>/dev/null 2>&1; then
            F=$(ls output/csv/*.csv | head -1)
            CSV_ROWS=$(tail -n +2 "$F" | wc -l)
            CSV_COLS=$(head -1 "$F" | tr ',' '\n' | wc -l)
          fi
          DAT_COUNT=0; DAT_LINES=0
          for f in output/dat/*.dat; do
            [ -f "$f" ] || continue
            DAT_COUNT=$((DAT_COUNT + 1))
            DAT_LINES=$((DAT_LINES + $(wc -l < "$f")))
          done
          JSON_COUNT=$(ls output/json/*.json 2>/dev/null | wc -l || echo 0)
          {
            echo "## MLB Data Pipeline -- Run Summary"
            echo ""
            echo "| Setting | Value |"
            echo "|---------|-------|"
            echo "| Mode | \`$MODE\` |"
            echo "| Date range | \`$START_DATE\` to \`${END_DATE:-$START_DATE}\` |"
            echo "| Phase 1 CSV | $RUN_P1 |"
            echo "| Phase 2 .dat | $RUN_P2 |"
            echo ""
            echo "| Phase | Output | Details |"
            echo "|-------|--------|---------|"
            echo "| Phase 1 | CSV box scores (57 cols) | ${CSV_ROWS} games, ${CSV_COLS} columns |"
            echo "| Phase 2 | .dat structured text | ${DAT_COUNT} file(s), ${DAT_LINES} lines |"
            echo "| JSON | Raw API responses | ${JSON_COUNT} file(s) |"
            echo ""
            echo "> Ran inside a pre-built Docker container -- no source code in this repo."
          } >> "$GITHUB_STEP_SUMMARY"
